<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projects - AL-Hossam-Hassan</title>
    <link rel="stylesheet" href="style.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <nav class="nav">
      <a href="home.html">Home</a>
      <a href="projects.html" class="active">Projects</a>
      <a href="index.html">Tools</a>
      <a href="contact.html">Contact</a>
    </nav>

    <header class="top">
      <h1>المشاريع - الحسام حسن</h1>
      <p>معرض أعمالي البرمجية وتطبيقات الويب</p>
    </header>

    <main class="grid" id="grid"></main>

    <script>
      // دالة عرض المشاريع
      function renderProjects() {
        const grid = document.getElementById("grid");

        // جلب البيانات من appConfig اللي عرفناه في config.js
        const data = appConfig.projects;

        if (!data || data.length === 0) {
          grid.innerHTML =
            "<h2 style='color:white; grid-column: 1/-1; text-align:center;'>لم يتم العثور على بيانات المشاريع</h2>";
          return;
        }

        grid.innerHTML = data
          .map(
            (p) => `
          <section class="card project-card">
            <div class="project-header">
            <div class="project-icon">
            <div class="project-icon-svg icon-folder"></div>
            </div>
            <h2>${p.title}</h2>
            </div>
            <p class="desc">${p.description}</p>
            <div class="tags">
              ${p.technologies.map((t) => `<span class="tag">${t}</span>`).join("")}
            </div>
            <div class="actions">
              <a class="btn" target="_blank" href="${p.githubUrl}">GitHub</a>
              <a class="btn btn-outline" target="_blank" href="${p.demoUrl}">Demo</a>
            </div>
          </section>
        `,
          )
          .join("");
      }

      // تشغيل الدالة بمجرد تحميل الصفحة
      window.onload = renderProjects;
    </script>

    <style>
      /* استايل إضافي لضمان الظهور */
      .nav a.active {
        border-bottom: 2px solid var(--acc);
        color: var(--acc);
      }
      .project-card {
        display: flex;
        flex-direction: column;
        background: var(--card);
        padding: 20px;
        border-radius: 16px;
      }
      .project-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .folder-icon {
        font-size: 1.5rem;
      }
      .tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .tag {
        background: #161e2d;
        border: 1px solid #2b3b55;
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 11px;
        color: #3b82f6;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: auto;
        padding-top: 15px;
        border-top: 1px solid #2b3b55;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--acc);
        color: var(--acc);
      }
    </style>
  </body>
</html>
